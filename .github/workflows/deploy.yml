name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RELEASE_ID: ${{ github.sha }}
      ARCHIVE_NAME: release-${{ github.sha }}.tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.x

      - name: Install dependencies and build assets
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Create release archive
        run: |
          LOCAL_ARCHIVE_PATH="/tmp/$ARCHIVE_NAME"
          tar \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="node_modules" \
            --exclude="tests" \
            --exclude="storage/logs/*" \
            --exclude="storage/framework/cache/*" \
            --exclude="storage/framework/sessions/*" \
            --exclude="storage/framework/views/*" \
            -czf "$LOCAL_ARCHIVE_PATH" .
          cp "$LOCAL_ARCHIVE_PATH" "$ARCHIVE_NAME"

      - name: Upload release archive
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "${{ env.ARCHIVE_NAME }}"
          target: "${{ secrets.DOMAIN_ROOT }}/tmp"

      - name: Prepare deploy script
        run: cp .github/scripts/deploy.sh deploy.sh

      - name: Upload deploy script
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "deploy.sh"
          target: "${{ secrets.DOMAIN_ROOT }}/tmp"

      - name: Deploy release atomically
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail
            DOMAIN_ROOT="${{ secrets.DOMAIN_ROOT }}"
            bash "$DOMAIN_ROOT/tmp/deploy.sh" "${{ env.RELEASE_ID }}" "$DOMAIN_ROOT"

      - name: Health check
        if: ${{ env.HEALTHCHECK_URL != '' }}
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        run: |
          curl --fail --silent --show-error \
            --retry 5 --retry-delay 5 --retry-connrefused \
            "$HEALTHCHECK_URL"
