name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install and build assets
        run: |
          pnpm install
          pnpm run build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ~/domains/main.sekolahkemurnian.sch.id/kemurnian-web
            git pull origin main
            /opt/alt/php84/usr/bin/php /usr/local/bin/composer install --no-dev --optimize-autoloader
            /opt/alt/php84/usr/bin/php artisan migrate --force
            /opt/alt/php84/usr/bin/php artisan config:cache
            /opt/alt/php84/usr/bin/php artisan route:cache
            /opt/alt/php84/usr/bin/php artisan view:cache

      - name: Copy built assets to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "public/build/"
          target: "~/domains/main.sekolahkemurnian.sch.id/kemurnian-web"

      - name: Safely sync public directory to public_html
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            rsync -a --delete ~/domains/main.sekolahkemurnian.sch.id/kemurnian-web/public/build/ ~/domains/main.sekolahkemurnian.sch.id/public_html/build/
            rsync -a --exclude='index.php' --exclude='.htaccess' ~/domains/main.sekolahkemurnian.sch.id/kemurnian-web/public/ ~/domains/main.sekolahkemurnian.sch.id/public_html/
